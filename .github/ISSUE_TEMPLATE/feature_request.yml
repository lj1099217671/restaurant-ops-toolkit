name: 功能建议 | Feature request
description: 提出不绑定厂商的餐饮经营能力。
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 不要包含私有 POS 接口、凭据或真实商户数据。Do not include private endpoints, credentials, or merchant data.
  - type: textarea
    id: workflow
    attributes:
      label: 经营场景 | Operating workflow
      description: 它要改善哪个餐饮经营决策或重复任务？
    validations:
      required: true
  - type: textarea
    id: metric
    attributes:
      label: 指标口径 | Metric definition
      description: 说明输入、公式、单位、分母和排除项。
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 预期价值 | Expected value
      description: 说明节省时间、减少错误或改善决策的方式。
