name: Bug report
description: Report a reproducible calculation or validation problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include private merchant data, credentials, or authenticated screenshots.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe the expected and actual behavior using synthetic data.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest synthetic CSV or code example that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
