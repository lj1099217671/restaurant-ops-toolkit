name: Bug 报告 | Bug report
description: 使用合成数据报告可复现的计算或校验问题。
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 不要包含商户数据、凭据或登录后截图。Do not include private merchant data, credentials, or authenticated screenshots.
  - type: textarea
    id: description
    attributes:
      label: 问题 | Problem
      description: 使用合成数据说明预期结果与实际结果。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现方式 | Reproduction
      description: 提供最小的合成 CSV 或代码示例。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本 | Version
      placeholder: v0.1.0
